<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOOR AI Studio</title><style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

.container{
padding:30px;
}

h1{
color:#00ffcc;
}

textarea{
width:90%;
height:120px;
background:#1a1a1a;
border:none;
border-radius:10px;
padding:15px;
color:white;
font-size:16px;
}

button{
margin-top:20px;
padding:15px 40px;
font-size:18px;
background:#00ffcc;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#00ddb3;
}

#result{
margin-top:30px;
}

</style></head><body><div class="container"><h1>NOOR AI VIDEO GENERATOR</h1><p>Type your idea and generate AI video</p><textarea id="prompt" placeholder="Example: A lion walking in desert sunset"></textarea><br><button onclick="generateVideo()">Generate AI Video</button>

<div id="result"></div></div><script>

async function generateVideo(){

const prompt = document.getElementById("prompt").value;

document.getElementById("result").innerHTML = "Generating video...";

const response = await fetch("https://abby-unabjuratory-karena.ngrok-free.dev//generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt:prompt
})

});

const data = await response.json();

if(data.video){

document.getElementById("result").innerHTML =
`<video controls autoplay width="320">
<source src="${data.video}" type="video/mp4">
</video>`;

}else{

document.getElementById("result").innerHTML="Video generation failed";

}

}

</script></body>
                                                                                                                         </html>
