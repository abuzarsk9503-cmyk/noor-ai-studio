<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noor AI Studio ULTRA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

header{
background:black;
padding:20px;
font-size:28px;
font-weight:bold;
letter-spacing:3px;
}

.container{
padding:20px;
}

textarea{
width:90%;
height:120px;
background:#1a1a1a;
border:none;
color:white;
padding:15px;
border-radius:10px;
}

button{
margin:10px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#00ffaa;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00cc88;
}

#sceneList{
margin-top:20px;
padding:10px;
background:#1a1a1a;
border-radius:10px;
}

.scene{
margin:8px;
padding:8px;
background:#2a2a2a;
border-radius:6px;
}

video{
width:90%;
max-width:650px;
margin-top:20px;
border-radius:10px;
background:black;
}

</style>

</head>

<body>

<header>NOOR AI STUDIO ULTRA</header>

<div class="container">

<textarea id="story" placeholder="Write story..."></textarea>

<br>

<button onclick="generateScenes()">Generate Scenes</button>

<button onclick="playVoice()">AI Voice</button>

<button onclick="generateVideo()">Generate Video</button>

<button onclick="downloadVideo()">Download</button>

<div id="sceneList"></div>

<video id="videoPlayer" controls></video>

<canvas id="canvas" width="800" height="450" style="display:none"></canvas>

</div>

<script>

let scenes=[]
let recorder
let chunks=[]

function generateScenes(){

let text=document.getElementById("story").value

scenes=text.split(".")

let box=document.getElementById("sceneList")
box.innerHTML=""

scenes.forEach((s,i)=>{

if(s.trim()=="") return

let div=document.createElement("div")
div.className="scene"
div.innerText="Scene "+(i+1)+": "+s

box.appendChild(div)

})

}

function playVoice(){

let text=document.getElementById("story").value

let speech=new SpeechSynthesisUtterance(text)

speech.rate=0.9
speech.pitch=0.8

speechSynthesis.speak(speech)

}

function generateVideo(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let stream=canvas.captureStream()

recorder=new MediaRecorder(stream)

chunks=[]

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=e=>{

let blob=new Blob(chunks,{type:"video/webm"})

window.videoBlob=blob

let url=URL.createObjectURL(blob)

document.getElementById("videoPlayer").src=url

}

recorder.start()

let i=0

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,800,450)

ctx.fillStyle="white"
ctx.font="30px Arial"

ctx.fillText(scenes[i],50,200)

i++

if(i<scenes.length){

setTimeout(draw,3000)

}else{

setTimeout(()=>recorder.stop(),3000)

}

}

draw()

}

function downloadVideo(){

let a=document.createElement("a")

a.href=URL.createObjectURL(window.videoBlob)

a.download="noor_ai_video.webm"

a.click()

}

</script>

</body>
</html>
