<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noor AI Studio ULTRA v5 </title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

header{
padding:25px;
font-size:28px;
font-weight:bold;
letter-spacing:3px;
background:black;
}

.container{
padding:20px;
}

textarea{
width:90%;
height:140px;
background:#1a1a1a;
border:none;
color:white;
padding:15px;
border-radius:12px;
font-size:16px;
}

button{

margin-top:20px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:10px;
background:#00ffaa;
font-weight:bold;
cursor:pointer;

}

#cinema{

width:95%;
max-width:600px;
margin-top:25px;
border-radius:12px;

}

</style>

</head>

<body>

<header>NOOR AI STUDIO ULTRA</header>

<div class="container">

<textarea id="story" placeholder="Write your movie story..."></textarea>

<br>

<button onclick="startMovie()">Generate Movie 🎬</button>

<img id="cinema">

</div>

<script>

let images=[]

function startMovie(){

let text=document.getElementById("story").value

let scenes=text.split(".")

images=[]

scenes.forEach(s=>{

if(s.trim()=="") return

let prompt="cinematic movie scene "+s

let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt)+"?seed="+Math.random()

images.push(url)

})

playCinema()

speakStory(text)

}

function playCinema(){

let i=0

let screen=document.getElementById("cinema")

function show(){

screen.src=images[i]

i++

if(i<images.length){

setTimeout(show,3000)

}

}

show()

}

function speakStory(text){

let speech=new SpeechSynthesisUtterance(text)

speech.rate=0.9
speech.pitch=0.8

speechSynthesis.speak(speech)

}

</script>

</body>
  </html>
