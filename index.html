<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stars"></div>

  <div class="container">

    <div class="left-panel">
      <div class="card time-card">
        <h3>TIME</h3>
        <div id="time" class="big"></div>
        <p id="date"></p>
      </div>

      <div class="card">
        <h3>SYSTEM</h3>
        <p>Battery: 11%</p>
        <p>CPU: 23%</p>
        <p>RAM: 54%</p>
        <p>Mode: JARVIS READY</p>
      </div>

      <div class="card tools">
        <h3>TOOLS</h3>
        <button>📁 Todo</button>
        <button>📝 Notes</button>
        <button>💰 Expense</button>
        <button>🧮 Calculator</button>
        <button>🔔 Reminder</button>
        <button>📔 Diary</button>
      </div>
    </div>

    <div class="center-panel">
      <h1>JARVIS</h1>
      <p class="online">ONLINE</p>

      <div class="hud"></div>

      <div id="chatArea" class="chat-area">
        <div class="jarvis-card">
          Ji Abuzar, kuch bolo...
        </div>
      </div>

      <div class="bottom-tools">
        <button>Todo</button>
        <button>Notes</button>
        <button>Expense</button>
        <button>Calculator</button>
        <button>Reminder</button>
        <button>Diary</button>
        <button>Timer</button>
      </div>

      <div class="input-bar">
        <input id="input" type="text" placeholder="Jarvis se bolo...">
        <button id="mic">🎤</button>
        <button id="send">➤</button>
      </div>
    </div>

    <div class="right-panel">
      <div class="card">
        <h3>MAUSAM</h3>
        <div class="big">27°C</div>
        <p>Cloudy</p>
        <p>Humidity: 62%</p>
      </div>

      <div class="card">
        <h3>LOCATION</h3>
        <p>Lat: 26.9124° N</p>
        <p>Long: 75.7873° E</p>
      </div>

      <div class="card">
        <h3>STATS</h3>
        <p>CPU: 23%</p>
        <p>RAM: 54%</p>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
          </html>
