<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noor AIStudio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

textarea{
width:90%;
height:120px;
background:#1a1a1a;
border:none;
border-radius:10px;
padding:15px;
color:white;
font-size:16px;
}

button{
margin-top:20px;
padding:14px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:disabled{
opacity:0.5;
}

.videoBox{
margin-top:30px;
}

video{
width:90%;
border-radius:12px;
}

</style>

</head>

<body>

<header>
NOOR AI
</header>

<div class="container">

<textarea id="prompt" placeholder="Describe your video..."></textarea>

<br>

<button id="createBtn" onclick="createVideo()">
Create
</button>

<div class="videoBox" id="result"></div>

</div>

<script>

async function createVideo(){

const prompt = document.getElementById("prompt").value;

if(!prompt){
alert("Write video idea first");
return;
}

const button = document.getElementById("createBtn");

button.innerText="Generating...";
button.disabled=true;

try{

const response = await fetch("https://ac0e86b5-3bf5-446c-b0bb-a6b892afd4cb-00-m17aokyiv61h.kirk.replit.dev/generate-video",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt:prompt
})

});

const data = await response.json();

if(data.video){

document.getElementById("result").innerHTML =
`<video controls autoplay>
<source src="${data.video}" type="video/mp4">
</video>`;

}else{

alert("Video generation failed");

}

}catch(err){

alert("Server connection error");

}

button.innerText="Create";
button.disabled=false;

}

</script>

</body>
</html>
