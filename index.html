<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS PRO — ABUZAR</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000814;font-family:'Courier New',monospace;color:#00d4ff;height:100vh;width:100vw;overflow:hidden}
        canvas{position:fixed;top:0;left:0;z-index:0;pointer-events:none}
        #app{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:grid;grid-template-columns:160px 1fr 160px;grid-template-rows:auto 1fr auto auto;gap:6px;padding:6px}
        .box{background:rgba(0,20,40,0.85);border:1px solid #00d4ff44;border-radius:8px;padding:8px;backdrop-filter:blur(5px);position:relative;overflow:hidden}
        .box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#00d4ff,transparent)}
        .box-title{font-size:9px;letter-spacing:3px;color:#00d4ff88;margin-bottom:6px;text-align:center;border-bottom:1px solid #00d4ff22;padding-bottom:4px}
        .box-val{font-size:11px;color:#00d4ff;line-height:1.8}
        .green{color:#00ff88}.yellow{color:#ffaa00}.red{color:#ff4444}
        #top-left{grid-column:1;grid-row:1;display:flex;flex-direction:column;gap:6px}
        #time-box .time-big{font-size:20px;font-weight:bold;color:#00d4ff;text-shadow:0 0 15px #00d4ff;text-align:center}
        #time-box .time-date{font-size:10px;color:#00d4ff88;text-align:center}
        #top-center{grid-column:2;grid-row:1;text-align:center;padding:4px}
        #jarvis-title{color:#ff4444 !important;font-size:32px !important;font-weight:bold;letter-spacing:8px;text-shadow:0 0 20px #00d4ff}
        #jarvis-online{font-size:9px;letter-spacing:4px;color:#00ff88;margin-top:2px}
        #top-right{grid-column:3;grid-row:1;display:flex;flex-direction:column;gap:6px}
        #mid-left{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
        #mid-left::-webkit-scrollbar{display:none}
        #mid-center{grid-column:2;grid-row:2;position:relative;display:flex;flex-direction:column;gap:6px}
        #mid-right{grid-column:3;grid-row:2;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
        #mid-right::-webkit-scrollbar{display:none}
        .tool-item{display:flex;align-items:center;gap:6px;padding:5px;border-radius:6px;cursor:pointer;transition:all 0.2s;touch-action:manipulation;font-size:11px}
        .tool-item:active{background:#00d4ff22}
        .tool-icon{font-size:13px}
        #hud-wrap{position:relative;flex:1;min-height:180px;display:flex;align-items:center;justify-content:center}
        #hud-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
        #chat-area{background:rgba(0,15,30,0.9);border:1px solid #00d4ff33;border-radius:10px;padding:8px;overflow-y:auto;max-height:160px;min-height:80px}
        #chat-area::-webkit-scrollbar{width:2px}
        #chat-area::-webkit-scrollbar-thumb{background:#00d4ff44}
        .msg-user{text-align:right;margin-bottom:6px}
        .msg-user .bubble{display:inline-block;background:#00d4ff22;border:1px solid #00d4ff44;border-radius:12px 12px 2px 12px;padding:6px 10px;font-size:11px;max-width:85%}
        .msg-ai{text-align:left;margin-bottom:6px}
        .msg-ai .bubble{display:inline-block;background:rgba(0,20,50,0.9);border:1px solid #00d4ff33;border-radius:2px 12px 12px 12px;padding:8px 10px;font-size:11px;max-width:90%}
        .ai-header{font-size:9px;color:#00d4ff88;letter-spacing:2px;margin-bottom:4px}
        .msg-time{font-size:9px;color:#00d4ff44;margin-top:2px}
        #bottom-tabs{grid-column:1/-1;grid-row:3;display:flex;gap:4px;overflow-x:auto;padding:2px 0}
        #bottom-tabs::-webkit-scrollbar{display:none}
        .tab-btn{background:rgba(0,20,40,0.9);border:1px solid #00d4ff33;color:#00d4ff88;padding:7px 10px;border-radius:8px;font-size:9px;cursor:pointer;white-space:nowrap;touch-action:manipulation;transition:all 0.2s;letter-spacing:1px}
        .tab-btn:active{background:#00d4ff22;border-color:#00d4ff;color:#00d4ff}
        #bottom-bar{grid-column:1/-1;grid-row:4;display:flex;align-items:center;gap:5px;padding:2px 0}
        #mic-btn-main{background:rgba(255,68,68,0.2);border:1px solid #ff4444;color:#ff4444;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:9px;touch-action:manipulation;white-space:nowrap}
        #mic-btn-main.on{background:rgba(0,255,136,0.2);border-color:#00ff88;color:#00ff88}
        #msg-input{flex:1;background:rgba(0,20,40,0.9);border:1px solid #00d4ff44;color:#00d4ff;padding:9px 14px;border-radius:25px;font-size:12px;outline:none;font-family:'Courier New',monospace}
        #msg-input::placeholder{color:#00d4ff33}
        #send-btn{background:#00d4ff22;border:1px solid #00d4ff66;color:#00d4ff;padding:9px 14px;border-radius:50%;cursor:pointer;touch-action:manipulation;font-size:14px}
        .action-btn{background:rgba(0,20,40,0.9);border:1px solid #00d4ff33;color:#00d4ff88;padding:7px 8px;border-radius:8px;cursor:pointer;font-size:10px;touch-action:manipulation;text-align:center;line-height:1.2}
        .stat-row{margin-bottom:5px}
        .stat-label{display:flex;justify-content:space-between;font-size:9px;margin-bottom:2px}
        .stat-bar{height:4px;background:#001a2e;border-radius:4px;overflow:hidden}
        .stat-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#00d4ff,#00ff88);box-shadow:0 0 6px #00d4ff}
        .song-ctrl{display:flex;justify-content:center;gap:10px;margin-top:6px}
        .song-btn{background:transparent;border:1px solid #00d4ff44;color:#00d4ff;padding:5px 9px;border-radius:6px;cursor:pointer;font-size:13px;touch-action:manipulation}
        .song-btn.play{background:#00d4ff22;border-color:#00d4ff}
        .yt-btn{width:100%;background:rgba(255,0,0,0.2);border:1px solid #ff0000;color:#ff4444;padding:4px;border-radius:6px;cursor:pointer;font-size:9px;margin-top:5px;letter-spacing:1px;touch-action:manipulation}
        #panel{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,8,20,0.97);z-index:10;display:none;flex-direction:column}
        #panel-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #00d4ff22}
        #panel-title{font-size:13px;letter-spacing:3px;color:#00d4ff}
        #panel-close{background:transparent;border:1px solid #ff444466;color:#ff4444;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:10px;touch-action:manipulation;white-space:nowrap}
    </style>
</head>
<body>
    <!-- Your HTML body content here -->
</body>
</html>
