<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noor AI Studio </title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}

header{
background:black;
padding:20px;
font-size:26px;
font-weight:bold;
letter-spacing:3px;
}

.container{
padding:20px;
}

textarea{
width:90%;
height:120px;
background:#1a1a1a;
border:none;
color:white;
padding:15px;
border-radius:10px;
}

button{
margin:10px;
padding:12px 25px;
font-size:16px;
border:none;
border-radius:8px;
background:#00ffaa;
cursor:pointer;
font-weight:bold;
}

#sceneList{
margin-top:20px;
}

.scene{
margin:10px;
padding:10px;
background:#1a1a1a;
border-radius:10px;
}

img{
width:90%;
max-width:500px;
border-radius:10px;
margin-top:10px;
}

#cinema{
width:90%;
max-width:600px;
margin-top:20px;
border-radius:10px;
}

</style>

</head>

<body>

<header>NOOR AI STUDIO v3 CINEMATIC</header>

<div class="container">

<textarea id="story" placeholder="Write story..."></textarea>

<br>

<button onclick="generateScenes()">Generate Scenes</button>

<button onclick="generateImages()">AI Images</button>

<button onclick="playVoice()">AI Voice</button>

<button onclick="playCinema()">Play Cinematic</button>

<div id="sceneList"></div>

<img id="cinema">

</div>

<script>

let scenes=[]
let images=[]

function generateScenes(){

let text=document.getElementById("story").value

scenes=text.split(".")

let box=document.getElementById("sceneList")
box.innerHTML=""

scenes.forEach((s,i)=>{

if(s.trim()=="") return

let div=document.createElement("div")
div.className="scene"
div.innerHTML="Scene "+(i+1)+" : "+s

box.appendChild(div)

})

}

function generateImages(){

let box=document.getElementById("sceneList")
box.innerHTML=""

images=[]

scenes.forEach((s,i)=>{

if(s.trim()=="") return

let prompt=s+" cinematic movie scene"

let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(prompt)

images.push(url)

let div=document.createElement("div")
div.className="scene"

let img=document.createElement("img")
img.src=url

div.innerHTML="Scene "+(i+1)+" : "+s

div.appendChild(img)

box.appendChild(div)

})

}

function playVoice(){

let text=document.getElementById("story").value

let speech=new SpeechSynthesisUtterance(text)

speech.rate=0.9
speech.pitch=0.8

speechSynthesis.speak(speech)

}

function playCinema(){

let i=0
let screen=document.getElementById("cinema")

function show(){

screen.src=images[i]

i++

if(i<images.length){

setTimeout(show,3000)

}

}

show()

}

</script>

</body>
</html>
